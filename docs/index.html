<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCAN web</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        #log { background: #eee; padding: 10px; height: 300px; overflow-y: scroll; font-family: monospace; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>

    <h2>PCAN web</h2>
    
    <button id="connectBtn">🔗 Connect COM</button>
    <div style="margin-top: 20px; padding:10px; background: #ddd;">
        <h3>CAN TX</h3>
        <div style="margin-bottom: 10px;">
            CAN ID : <input type="text" id="txIdInput" class="hex-input" value="0x123" size="6" maxlength="5">
        </div>
        
        データ:
        <table style="text-align: center; border-collapse: collapse;">
            <tr>
                <td style="background: #ccc; width: 45px;">0</td>
                <td style="background: #ccc; width: 45px;">1</td>
                <td style="background: #ccc; width: 45px;">2</td>
                <td style="background: #ccc; width: 45px;">3</td>
                <td style="background: #ccc; width: 45px;">4</td>
                <td style="background: #ccc; width: 45px;">5</td>
                <td style="background: #ccc; width: 45px;">6</td>
                <td style="background: #ccc; width: 45px;">7</td>
            </tr>
            <tr>
                <td><input type="text" id="txData0" class="hex-input" size="4" maxlength="4" value="0x00"></td>
                <td><input type="text" id="txData1" class="hex-input" size="4" maxlength="4" value="0x00"></td>
                <td><input type="text" id="txData2" class="hex-input" size="4" maxlength="4" value="0x00"></td>
                <td><input type="text" id="txData3" class="hex-input" size="4" maxlength="4" value="0x00"></td>
                <td><input type="text" id="txData4" class="hex-input" size="4" maxlength="4" value="0x00"></td>
                <td><input type="text" id="txData5" class="hex-input" size="4" maxlength="4" value="0x00"></td>
                <td><input type="text" id="txData6" class="hex-input" size="4" maxlength="4" value="0x00"></td>
                <td><input type="text" id="txData7" class="hex-input" size="4" maxlength="4" value="0x00"></td>
            </tr>
        </table>
        <br>
        <button id="sendBtn">📤 送信</button>
    </div>
    <br><br>
    <div id="log">ここにデータが表示されます...</div>

    <script>
        let port;
        let reader;
        let receiveBuffer = ""; // 届いた文字を一時的に貯める箱

        const connectBtn = document.getElementById('connectBtn');
        const logDiv = document.getElementById('log');
        const txIdInput = document.getElementById('txIdInput');
        const txDataInput = document.getElementById('txDataInput');
        const sendBtn = document.getElementById('sendBtn');

        // Connectボタンが押されたときの処理
        connectBtn.addEventListener('click', async () => {
            try {
                // 1. ブラウザのポップアップを出して、ユーザーにCOMポートを選ばせる
                port = await navigator.serial.requestPort();
                
                // 2. ポートを開く (BaudRate: 115200)
                await port.open({ baudRate: 115200 });
                logDiv.innerHTML += "<div>[System] ポートを開きました！</div>";
                connectBtn.disabled = true;

                // 3. データの受信ループを開始
                readUntilClosed();
            } catch (error) {
                console.error("接続エラー:", error);
                logDiv.innerHTML += `<div style="color:red;">[Error] ${error.message}</div>`;
            }
        });

        // 📤 送信ボタンがクリックされた時の処理 (ConvertBack に相当)
        sendBtn.addEventListener('click', async () => {
            // .replace(/0x/gi, '') で、大文字小文字問わず 0x を剥ぎ取る！
            const idText = txIdInput.value.replace(/0x/gi, '').trim();

            let dataText = "";
            for (let i = 0; i < 8; i++) {
                // 各データの 0x も剥ぎ取る
                let val = document.getElementById(`txData${i}`).value.replace(/0x/gi, '').trim();
                
                if (val !== "") {
                    dataText += val.padStart(2, '0');
                } else {
                    break; 
                }
            }

            // IDとデータが空なら何もしない
            if (idText === "") return;

            const dlc = Math.floor(dataText.length / 2);
            const paddedId = idText.padStart(3, '0');
            const slcanString = `t${paddedId}${dlc}${dataText}\r`;

            const div = document.createElement("div");
            div.style.color = "blue";
            div.textContent = `[Tx] 送信: ${slcanString}`;
            logDiv.appendChild(div);
            logDiv.scrollTop = logDiv.scrollHeight;

            if (port && port.writable) {
                const encoder = new TextEncoder();
                const writer = port.writable.getWriter();
                await writer.write(encoder.encode(slcanString));
                writer.releaseLock();
            } else {
                alert("COMポートが繋がっていません！");
            }
        });

        // 💡 WPFの Convert に相当する処理（自動フォーマット）
        // class="hex-input" が付いている全ての入力欄を捕まえる
        const hexInputs = document.querySelectorAll('.hex-input');
        
        hexInputs.forEach(input => {
            
            // 💡追加：文字が入力された瞬間に発動するガード処理
            input.addEventListener('input', (e) => {
                // 「0〜9」「A〜F」「a〜f」「x」「X」"以外"の文字が入力されたら、空っぽ('')に置き換えて消し去る！
                e.target.value = e.target.value.replace(/[^0-9A-Fa-fxX]/g, '');
            });

            // --- (以下はそのまま残します) ---
            
            // 入力欄からフォーカスが外れた時（blur）に発動
        input.addEventListener('blur', (e) => {
            let val = e.target.value.replace(/0x/gi, '').trim();
            
            // 空っぽなら 0 にする
            if (val === "") {
                val = "0";
            }

            // 💡追加：文字を「16進数の数値」として解釈する
            let num = parseInt(val, 16);
            if (isNaN(num)) num = 0; // 万が一数値じゃなかったら0にするフェイルセーフ

            if (e.target.id === 'txIdInput') {
                // ID欄：標準IDの最大値は 0x7FF (10進数で2047)
                if (num > 0x7FF) num = 0x7FF;
                // 数値を16進数の文字に戻して 0x を付ける
                e.target.value = "0x" + num.toString(16).padStart(3, '0').toUpperCase();
            } else {
                // データ欄：1バイトの最大値は 0xFF (10進数で255)
                if (num > 0xFF) num = 0xFF;
                // 数値を16進数の文字に戻して 0x を付ける
                e.target.value = "0x" + num.toString(16).padStart(2, '0').toUpperCase();
            }
        });

            // クリックした時に全選択状態にする
            input.addEventListener('focus', (e) => {
                e.target.select();
            });
        });

        // 常にデータを受信し続ける処理
        async function readUntilClosed() {
            // 文字列として読み込むためのデコーダー（バイト配列 -> 文字）
            const textDecoder = new TextDecoderStream();
            const readableStreamClosed = port.readable.pipeTo(textDecoder.writable);
            reader = textDecoder.readable.getReader();

            try {
                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break; // ポートが閉じられたら終了
                    
                    if (value) {
                        receiveBuffer += value; // 届いた文字をバッファに足す
                        
                        // '\r' (キャリッジリターン) が含まれているかチェック
                        let lines = receiveBuffer.split('\r');
                        
                        // 最後の要素はまだ完了していない途中のデータなのでバッファに残す
                        receiveBuffer = lines.pop(); 

                        // '\r' で区切られた完全な1行分（コマンド）を処理する
                        for (let line of lines) {
                            if (line.trim() !== "") {
                                parseSlcan(line.trim());
                            }
                        }
                    }
                }
            } catch (error) {
                console.error("読み取りエラー:", error);
            } finally {
                reader.releaseLock();
            }
        }

        // slcan文字列を解読して画面に表示する処理
        function parseSlcan(rawData) {
            // 例: "t12381122334455667788" などを解読する
            if (rawData.length < 5) return;

            const type = rawData[0];
            const isStandard = (type === 't');
            const idLength = isStandard ? 3 : 8;

            const idStr = rawData.substring(1, 1 + idLength);
            const dlcStr = rawData.substring(1 + idLength, 1 + idLength + 1);
            const dlc = parseInt(dlcStr, 16);

            const dataStr = rawData.substring(1 + idLength + 1);

            // 画面に追記する
            const displayStr = `ID: 0x${idStr} | DLC: ${dlc} | Data: ${dataStr}`;
            
            const newLog = document.createElement("div");
            newLog.textContent = displayStr;
            logDiv.appendChild(newLog);

            // 最新のデータが見えるように一番下へスクロール
            logDiv.scrollTop = logDiv.scrollHeight;
        }
    </script>
</body>
</html>
